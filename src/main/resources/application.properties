```properties
# ================================================================
# Smart Resume Analyzer - Application Configuration
# ================================================================

spring.application.name=resume-analyzer

# ✅ Dynamic port for Render
server.port=${PORT:8080}
server.servlet.context-path=/api/v1

# ── Database (Use Environment Variables) ────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Connection Pool ───────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ── JWT ───────────────────────────────────────────────────────
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# ── File Upload ───────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.file.upload-dir=./uploads/resumes
app.file.allowed-types=pdf,doc,docx,txt

# ── CORS (Allow deployed frontend) ─────────────────────────────
app.cors.allowed-origins=*

# ── Swagger ───────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ── Logging ───────────────────────────────────────────────────
logging.level.com.example.resume_analyzer_backend=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n
```
